 "520":{l:"Weapons offense",c:"#B7791F",g:"property"},"290":{l:"Vandalism",c:"#718096",g:"property"},
 "13B":{l:"Simple assault",c:"#D69E2E",g:"property"},
 "THEFT":{l:"Theft / larceny",c:"#2F855A",g:"property"},"DRUGS":{l:"Drugs",c:"#0D9488",g:"property"}
};
function catKey(code){ if(code in CAT) return code; if(code&&code.indexOf("23")===0) return "THEFT"; if(code==="35A"||code==="35B") return "DRUGS"; return null; }

const map=L.map("map",{zoomControl:true,preferCanvas:true}).setView([30.42,-91.10],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);

// one toggle layer per category
const layers={}; Object.keys(CAT).forEach(k=>layers[k]=L.layerGroup());
const rentG=L.layerGroup(), saleG=L.layerGroup();
let rings=[];

function searchLink(label,date){
 const q=encodeURIComponent('Baton Rouge "'+label+'" '+(date||''));
 return 'https://www.google.com/search?tbm=nws&q='+q;
}
function addPt(p){
 const k=catKey(p[2]); if(!k) return; const cat=CAT[k];
 // L.circle (meters) => grows on zoom-in for a larger click target
 L.circle([p[0],p[1]],{radius:34,color:"#fff",weight:1,fillColor:cat.c,fillOpacity:.72,bubblingMouseEvents:false})
  .bindPopup('<div class="pop"><b>'+cat.l+'</b><div class="row">'+(p[3]||'date n/a')+' · BRPD report</div>'+
    '<div class="row">Exact narrative isn\'t in the open data. <a href="'+searchLink(cat.l,p[3])+'" target="_blank" rel="noopener">Search news ↗</a></div></div>')
  .addTo(layers[k]);
}
VPTS.forEach(addPt); PPTS.forEach(addPt);

// distinct listing symbol: a teardrop house pin colored by crime risk
function pinIcon(color,off){
 const o=off?0.55:1;
 const svg='<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg" style="opacity:'+o+'">'+
  '<path d="M13 0C6 0 1 5 1 12c0 8 12 22 12 22s12-14 12-22C25 5 20 0 13 0z" fill="'+color+'" stroke="#fff" stroke-width="2"/>'+
  '<circle cx="13" cy="12" r="6.5" fill="#fff"/><text x="13" y="16" font-size="9" text-anchor="middle" fill="'+color+'">🏠</text></svg>';
 return L.divIcon({className:"pin-ico",html:svg,iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-30]});
}
const BURG14={"2115 E Ramsey Dr": 1, "2437 Fiero St": 2, "9003 Magnolia View Dr": 1, "415 Bedford Dr": 16, "417 Bedford Dr": 16, "9446 High Point Rd": 0, "709 Staring Ln": 1, "The Terraces at Perkins Rowe": 0, "8808 Magnolia Leaf Ave": 1, "4738 Woodlyn Dr": 3, "5416 Heron Nest Dr": 0, "6024 Woodlawn Park Ct": 0, "9314 Fox Run Ave": 0, "10177 Bonnet Cove Ave": 0, "633 Fall Creek Dr": 0, "9412 Windward Rd": 0, "4573 Charleston Villa Dr": 0, "620 Nelson Dr": 1, "734 Caddo St": 1, "2103 Government St": 9, "1525 S Eugene St": 0, "750 Acadia St": 0, "541 Terry Dr": 11, "740 Acadia St": 0, "2102 Sassy Ln": 0, "2340 Government St": 14, "3650 Perkins Rd": 1, "4468 Cypress St": 1, "2326 Terrace Ave": 0, "540 Drehr Ave": 11, "2267 Cedardale Ave": 5, "4268 Arrowhead St": 1};
const AUTO14={"2115 E Ramsey Dr": 1, "2437 Fiero St": 1, "9003 Magnolia View Dr": 1, "415 Bedford Dr": 4, "417 Bedford Dr": 4, "9446 High Point Rd": 0, "709 Staring Ln": 1, "The Terraces at Perkins Rowe": 0, "8808 Magnolia Leaf Ave": 1, "4738 Woodlyn Dr": 3, "5416 Heron Nest Dr": 0, "6024 Woodlawn Park Ct": 0, "9314 Fox Run Ave": 0, "10177 Bonnet Cove Ave": 0, "633 Fall Creek Dr": 0, "9412 Windward Rd": 0, "4573 Charleston Villa Dr": 0, "620 Nelson Dr": 0, "734 Caddo St": 1, "2103 Government St": 2, "1525 S Eugene St": 0, "750 Acadia St": 0, "541 Terry Dr": 6, "740 Acadia St": 1, "2102 Sassy Ln": 1, "2340 Government St": 3, "3650 Perkins Rd": 0, "4468 Cypress St": 0, "2326 Terrace Ave": 2, "540 Drehr Ave": 3, "2267 Cedardale Ave": 1, "4268 Arrowhead St": 0};
const BURG_TIERS=[{t:"Low",max:1,c:"#1E7A34"},{t:"Moderate",max:5,c:"#9A6A00"},{t:"Elevated",max:11,c:"#C2691C"},{t:"High",max:1e9,c:"#B23B3B"}];
const AUTO_TIERS=[{t:"Low",max:1,c:"#1E7A34"},{t:"Moderate",max:3,c:"#9A6A00"},{t:"Elevated",max:6,c:"#C2691C"},{t:"High",max:1e9,c:"#B23B3B"}];
function tierBy(n,T){ if(n==null) return null; let i=T.findIndex(s=>n<s.max); if(i<0)i=3; return T[i]; }
function popupHtml(p){
 const s=tier(p.r05), off=p.status==="off";
 const rk=(p.jamie!=null||p.keegan!=null)?('<div class="row">Ranking — Jamie: '+(p.jamie==null?"–":p.jamie)+" · Keegan: "+(p.keegan==null?"–":p.keegan)+"</div>"):"";
 const cr=(p.r05!=null)?('<div class="row" style="margin-top:3px">Violent crime risk: <span class="badge" style="background:'+s.c+'22;color:'+s.c+'">'+s.t+'</span></div>'+'<div class="row" style="display:flex;gap:5px;margin-top:3px">'+'<span style="flex:1;text-align:center;background:'+s.c+'14;border:1px solid '+s.c+'33;border-radius:6px;padding:3px 2px"><b style="display:block;font-size:14px;line-height:1.15;color:'+s.c+'">'+p.r025+'</b><span style="font-size:9.5px;color:#6B7480">within &frac14; mi</span></span>'+'<span style="flex:1;text-align:center;background:'+s.c+'14;border:1px solid '+s.c+'33;border-radius:6px;padding:3px 2px"><b style="display:block;font-size:14px;line-height:1.15;color:'+s.c+'">'+p.r05+'</b><span style="font-size:9.5px;color:#6B7480">within &frac12; mi</span></span>'+'<span style="flex:1;text-align:center;background:'+s.c+'14;border:1px solid '+s.c+'33;border-radius:6px;padding:3px 2px"><b style="display:block;font-size:14px;line-height:1.15;color:'+s.c+'">'+p.r10+'</b><span style="font-size:9.5px;color:#6B7480">within 1 mi</span></span>'+'</div>'+'<div class="row" style="font-size:9.5px;color:#6B7480;margin-top:2px">violent incidents, last 12 mo</div>'):"";
 const bn=BURG14[p.address], bt=tierBy(bn,BURG_TIERS), an=AUTO14[p.address], at=tierBy(an,AUTO_TIERS);
 const trow=(lbl,n,t)=>t?('<div class="row" style="margin-top:3px">'+lbl+': <span class="badge" style="background:'+t.c+'22;color:'+t.c+'">'+t.t+'</span> <span style="color:#6B7480">'+n+' within &frac14; mi</span></div>'):"";
 const tcr=trow("Burglary",bn,bt)+trow("Car theft",an,at);
 return '<div class="pop"><b>'+p.address+'</b>'+(off?'<span class="tag" style="background:#E7EAEE;color:#6B7480">OFF-MARKET</span>':"")+
   '<div class="row">'+money(p.price,p.type)+(p.beds?" · "+p.beds+"bd":"")+(p.baths?"/"+p.baths+"ba":"")+(p.size?" · "+p.size.toLocaleString()+" sqft":"")+'</div>'+
   '<div class="row">'+(p.neighborhood||"")+" · ZIP "+p.zip+'</div>'+cr+tcr+rk+
   (p.link?'<div class="row"><a href="'+p.link+'" target="_blank" rel="noopener">Open listing ↗</a></div>':"")+'</div>';
}
const bounds=[];
PINS.forEach(p=>{
 const s=tier(p.r05), off=p.status==="off";
 const m=L.marker([p.lat,p.lon],{icon:pinIcon(s.c,off),zIndexOffset:1000}).bindPopup(popupHtml(p));
 m.on("click",()=>{ rings.forEach(r=>map.removeLayer(r)); rings=[0.25,0.5,1.0].map(mi=>
   L.circle([p.lat,p.lon],{radius:mi*1609.34,color:s.c,weight:1.2,fill:false,opacity:.6,dashArray:"5,5"}).addTo(map)); });
 (p.type==="rent"?rentG:saleG).addLayer(m);
 bounds.push([p.lat,p.lon]);
});
// default visible: violent categories + listings
["09A","13A","120","11A"].forEach(k=>layers[k].addTo(map));
rentG.addTo(map); saleG.addTo(map);
map.on("popupclose",()=>{ rings.forEach(r=>map.removeLayer(r)); rings=[]; });
if(bounds.length) map.fitBounds(bounds,{padding:[40,40]});

const sw=k=>'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+CAT[k].c+';margin-right:5px;vertical-align:middle"></span>';
const overlays={"🏠 Rentals":rentG,"🏠 For sale":saleG};
overlays["<b style=\"color:#5A6472\">— Violent —</b>"]=L.layerGroup();
["09A","13A","120","11A"].forEach(k=>overlays[sw(k)+CAT[k].l]=layers[k]);
overlays["<b style=\"color:#5A6472\">— Property / other —</b>"]=L.layerGroup();
["220","THEFT","240","520","DRUGS","290","13B"].forEach(k=>overlays[sw(k)+CAT[k].l]=layers[k]);
L.control.layers(null,overlays,{collapsed:false,sortLayers:false}).addTo(map);

const legend=L.control({position:"bottomleft"});
legend.onAdd=function(){const div=L.DomUtil.create("div","legend");
 div.innerHTML='<b>🏠 Listings</b> — pin color = violent crime risk (within &frac12; mi)<br>'+
  TIERS.map(t=>'<div><i style="background:'+t.c+'"></i>'+t.t+'</div>').join("")+
  '<div class="small">Crime types (with their colors) toggle at top-right. Dots grow as you zoom in. BRPD Crime Incidents (data.brla.gov, pbin-pcm7), last 12 mo near the listings; citywide + multi-year coming. ~31% of violent incidents lack coordinates.</div>';
 return div;};
legend.addTo(map);

</script></body></html>
