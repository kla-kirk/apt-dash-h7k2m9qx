<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Apartment Hunting Dashboard</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0f1115; color: #e7e9ee;
    }
    .card {
      max-width: 560px; padding: 2.5rem 2.75rem; text-align: center;
      background: #171a21; border: 1px solid #262b36; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    h1 { font-size: 1.4rem; margin: 0 0 .5rem; }
    p { line-height: 1.55; color: #aab1c0; margin: .4rem 0; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
      background:#f5a524; margin-right:8px; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    code { background:#0f1115; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>Dashboard coming online</h1>
    <p>The Baton Rouge apartment-hunting dashboard is being prepared and will
       appear here shortly.</p>
    <p>This page is unlisted and set to <code>noindex</code>. If you reached it
       by accident, there's nothing to see yet.</p>
  </div>
</body>
</html>
